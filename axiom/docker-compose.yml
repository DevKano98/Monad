services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: axiom
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend/api
    environment:
      DATABASE_URL: postgresql+asyncpg://axiom:axiom@postgres:5432/axiom
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  web:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:web -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
    depends_on:
      - api

volumes:
  postgres_data:
